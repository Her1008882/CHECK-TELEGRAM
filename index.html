<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Dashboard</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.login-box {
  background:#0f172a;
  padding:30px;
  border-radius:12px;
  width:300px;
  box-shadow:0 0 20px #00f0ff33;
}
input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}
button {
  width:100%;
  padding:10px;
  background:#00f0ff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>Login Dashboard</h2>
  <input type="text" placeholder="Username" id="user">
  <input type="password" placeholder="Password" id="pass">
  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "admin" && p === "admin"){
    window.location = "dashboard.html";
  } else {
    alert("Login gagal!");
  }
}
</script>

</body>
</html>
